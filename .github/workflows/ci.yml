name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-arm64:
    name: Test (ARM64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Run unit tests
        run: zig build test --summary all

  test-riscv64:
    name: Test (RISC-V64)
    runs-on: ubuntu-24.04-riscv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Run unit tests
        run: zig build test --summary all

  smoke:
    name: Smoke
    runs-on: ubuntu-24.04
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/zig-cache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Create zig-cache directory
        run: mkdir -p zig-cache

      - name: Cache Zig build cache
        uses: actions/cache@v3
        with:
          path: zig-cache
          key: x64-zig-${{ hashFiles('build.zig', 'flake.nix', 'justfile', 'infra/**/*.zig', 'infra/**/*.json', 'src/**/*.zig') }}
          restore-keys: |
            x64-zig-

      - name: Check formatting
        run: nix develop -c find . -name "*.zig" -not -path "./zig-cache/*" -not -path "./zig-out/*" -exec zig fmt --check {} \;

      - name: Smoke test (boot both architectures in QEMU)
        run: nix develop -c just smoke
