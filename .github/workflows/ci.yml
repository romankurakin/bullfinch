name: CI

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]

jobs:
  hooks:
    name: Hooks
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y just llvm
          cargo install --locked prek

      - name: Run hooks
        run: just hooks-pre-commit

  test-arm64:
    name: Unit ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Run unit tests
        run: cargo test --quiet -p bullfinch-kernel --lib

  test-riscv64:
    name: Unit RISC-V
    runs-on: ubuntu-24.04-riscv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Run unit tests
        run: cargo test --quiet -p bullfinch-kernel --lib

  smoke-arm64:
    name: Smoke ARM64
    runs-on: ubuntu-24.04-arm
    needs: [hooks, test-arm64, test-riscv64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y just llvm qemu-system-arm qemu-system-misc

      - name: Smoke test
        run: just smoke-arm64

  smoke-riscv64:
    name: Smoke RISC-V
    runs-on: ubuntu-24.04-arm
    needs: [hooks, test-arm64, test-riscv64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y just llvm qemu-system-arm qemu-system-misc

      - name: Smoke test
        run: just smoke-riscv64
